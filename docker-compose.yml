version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: meshboard-db
    environment:
      POSTGRES_USER: meshboard
      POSTGRES_PASSWORD: meshboard123
      POSTGRES_DB: meshboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meshboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: meshboard-supernode
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://meshboard:meshboard123@db:5432/meshboard
      JWT_SECRET: dev-secret-key-change-in-production
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      PORT: 3000
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
