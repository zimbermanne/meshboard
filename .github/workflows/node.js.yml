name: Connectivity CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  connectivity:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: meshboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/meshboard
      BACKEND_URL: http://localhost:8080
      FRONTEND_URL: http://localhost:5173
      PORT: 8080

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Backend dependencies
        working-directory: Backend
        run: npm ci

      - name: Run migrations
        working-directory: Backend
        run: npm run migrate

      - name: Start Backend
        working-directory: Backend
        run: |
          node index.js &
          echo $! > ../backend.pid
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null; then
              echo "Backend ready"
              exit 0
            fi
            sleep 1
          done
          echo "Backend failed to start"
          exit 1

      - name: Backend connectivity checks
        run: |
          curl -sf http://localhost:8080/api/health | grep -q '"database":"connected"'
          BACKEND_URL=http://localhost:8080 npm run connectivity

      - name: Install Frontend dependencies
        working-directory: Frontend
        run: npm ci

      - name: Build Frontend
        working-directory: Frontend
        run: npm run build

      - name: Start Frontend
        working-directory: Frontend
        env:
          PORT: 5173
          BACKEND_URL: http://localhost:8080
        run: |
          node serve.js &
          echo $! > ../frontend.pid
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5173/health > /dev/null; then
              echo "Frontend ready"
              exit 0
            fi
            sleep 1
          done
          echo "Frontend failed to start"
          exit 1

      - name: Full stack connectivity
        run: npm run connectivity:local

      - name: Stop servers
        if: always()
        run: |
          if [ -f backend.pid ]; then kill "$(cat backend.pid)" 2>/dev/null || true; fi
          if [ -f frontend.pid ]; then kill "$(cat frontend.pid)" 2>/dev/null || true; fi
